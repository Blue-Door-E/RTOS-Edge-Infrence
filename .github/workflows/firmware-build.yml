name: Firmware Build Check

on:
  pull_request:
    paths:
      - "main/**"
      - "CMakeLists.txt"
      - "dependencies.lock"
      - "sdkconfig"
      - "sdkconfig.defaults"
      - ".github/workflows/firmware-build.yml"
  push:
    branches:
      - main
    paths:
      - "main/**"
      - "CMakeLists.txt"
      - "dependencies.lock"
      - "sdkconfig"
      - "sdkconfig.defaults"
      - ".github/workflows/firmware-build.yml"
  workflow_dispatch:

jobs:
  build-esp32s3:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark workspace as Git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate Wi-Fi config files
        env:
          AP_SSID: ${{ secrets.AP_SSID }}
          AP_PASS: ${{ secrets.AP_PASS }}
        run: |
          : > main/configs.c
          cat > main/configs.h <<EOF
          #define AP_SSID "${AP_SSID}"
          #define AP_PASS "${AP_PASS}"
          EOF

      - name: ESP-IDF version
        run: . /opt/esp/idf/export.sh && idf.py --version

      - name: Build firmware (ESP32-S3)
        run: . /opt/esp/idf/export.sh && idf.py -DIDF_TARGET=esp32s3 build
